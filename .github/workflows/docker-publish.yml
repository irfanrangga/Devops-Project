name: Membuat dan Mempublikasikan Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push laravel Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/laravel-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/laravel-app:buildcache,mode=max
